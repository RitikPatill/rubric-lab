version: '3.9'

services:
  api:
    build: ./apps/api
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: sqlite:///./data/rubriclab.db
    volumes:
      - data:/app/data

  web:
    build: ./apps/web
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  data:
