version: '3.9'

services:
  api:
    build: ./apps/api
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: sqlite:///./data/rubriclab.db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 10s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  data:
